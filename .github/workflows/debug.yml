name: debug

on:
  push:
    branches:
      - debug
  pull_request:
    branches:
      - debug
  workflow_dispatch:

jobs:
  build-appimage-ubuntu-22-04:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.3.*'
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          archives: 'qttools qtsvg qtimageformats qtbase qtmultimedia icu'

      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake
          make -j"$(nproc)"

      - name: Build AppImage with ci/appimage/bundle.sh
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          cd ${GITHUB_WORKSPACE}
          sh ./ci/appimage/bundle.sh
          chmod +x Dust3D-x86_64.AppImage
          mv Dust3D-x86_64.AppImage dust3d-debug-built.AppImage

      - name: Upload built AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-debug-built-appimage
          path: dust3d-debug-built.AppImage

  fedora-appimage-crash-debug:
    if: false
    needs: build-appimage-ubuntu-22-04
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install debug dependencies
        run: |
          dnf -y update
          dnf -y install \
            file \
            fontconfig \
            gdb \
            glibc-langpack-en \
            libX11 \
            libXcursor \
            libXext \
            libxcb \
            mesa-dri-drivers \
            mesa-libGL \
            mesa-vulkan-drivers \
            procps-ng \
            which \
            xorg-x11-server-Xvfb

      - name: Download built AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dust3d-debug-built-appimage
          path: .

      - name: Prepare AppImage
        run: |
          mv dust3d-debug-built.AppImage dust3d.AppImage
          chmod +x dust3d.AppImage
          sha256sum dust3d.AppImage | tee sha256sum.txt
          file dust3d.AppImage | tee file.txt

      - name: Extract AppImage
        run: |
          ./dust3d.AppImage --appimage-extract
          
      - name: Verify extracted structure
        run: |
          echo "=== Verifying AppImage structure ==="
          if [ ! -d squashfs-root ]; then
            echo "ERROR: squashfs-root directory not created"
            exit 1
          fi
          
          echo "Checking critical files:"
          ls -lh squashfs-root/AppRun || echo "ERROR: AppRun not found"
          ls -lh squashfs-root/usr/bin/dust3d || echo "ERROR: Binary not found"
          ls -lh squashfs-root/usr/lib/libfontconfig.so.1 2>/dev/null || echo "WARNING: libfontconfig.so.1 not found"
          
          echo ""
          echo "Full directory structure:"
          find squashfs-root -type f -executable | sort

      - name: Run debug probes
        run: |
          set +e
          cd squashfs-root
          
          # Verify we're in the right place
          echo "=== Current directory ==="
          pwd
          echo "AppRun details:"
          file ./AppRun
          ./AppRun --version 2>&1 || echo "AppRun execution attempted"
          
          echo ""
          echo "Binary details:"
          file ./usr/bin/dust3d
          ./usr/bin/dust3d --version 2>&1 || echo "Binary execution attempted"
          
          ulimit -c 0
          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 2

          echo ""
          echo "=== Test 1: Running AppRun with debug logging ==="
          timeout 10s env APPIMAGE_DEBUG=1 QT_DEBUG_PLUGINS=1 LIBGL_DEBUG=verbose MESA_DEBUG=1 ./AppRun \
            > ../run-apprun-debug.log 2>&1
          echo $? > ../run-apprun-debug.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 2: Running AppRun with software OpenGL ==="
          timeout 10s env QT_OPENGL=software ./AppRun > ../run-apprun-software-gl.log 2>&1
          echo $? > ../run-apprun-software-gl.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 3: Running usr/bin/dust3d directly ==="
          timeout 10s ./usr/bin/dust3d > ../run-binary.log 2>&1
          echo $? > ../run-binary.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 4: Running usr/bin/dust3d with software OpenGL ==="
          timeout 10s env QT_OPENGL=software ./usr/bin/dust3d > ../run-binary-software-gl.log 2>&1
          echo $? > ../run-binary-software-gl.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 5: Running gdb for AppRun ==="
          timeout 10s gdb -q -batch \
            -ex "set pagination off" \
            -ex "run" \
            -ex "bt full" \
            -ex "thread apply all bt full" \
            -ex "info sharedlibrary" \
            --args ./AppRun > ../gdb-apprun.txt 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 6: Running gdb for usr/bin/dust3d ==="
          timeout 10s gdb -q -batch \
            -ex "set pagination off" \
            -ex "run" \
            -ex "bt full" \
            -ex "thread apply all bt full" \
            -ex "info sharedlibrary" \
            --args ./usr/bin/dust3d > ../gdb-binary.txt 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true
          
          echo ""
          echo "=== Exit codes summary ==="
          echo "AppRun debug: $(cat ../run-apprun-debug.exitcode)"
          echo "AppRun software GL: $(cat ../run-apprun-software-gl.exitcode)"
          echo "Binary: $(cat ../run-binary.exitcode)"
          echo "Binary software GL: $(cat ../run-binary-software-gl.exitcode)"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-appimage-crash-debug
          path: |
            sha256sum.txt
            file.txt
            run-apprun-debug.log
            run-apprun-debug.exitcode
            run-apprun-software-gl.log
            run-apprun-software-gl.exitcode
            run-binary.log
            run-binary.exitcode
            run-binary-software-gl.log
            run-binary-software-gl.exitcode
            gdb-apprun.txt
            gdb-binary.txt

      - name: Evaluate crash results
        run: |
          apprun_code=$(cat run-apprun-debug.exitcode)
          apprun_sw_code=$(cat run-apprun-software-gl.exitcode)
          binary_code=$(cat run-binary.exitcode)
          binary_sw_code=$(cat run-binary-software-gl.exitcode)

          echo "AppRun debug exit code: $apprun_code"
          echo "AppRun software GL exit code: $apprun_sw_code"
          echo "Binary exit code: $binary_code"
          echo "Binary software GL exit code: $binary_sw_code"

          if [ "$apprun_code" = "139" ] || [ "$apprun_sw_code" = "139" ]; then
            echo "Detected AppRun segmentation fault (exit code 139)."
            exit 1
          fi

          if [ "$binary_code" = "139" ] || [ "$binary_sw_code" = "139" ]; then
            echo "Detected direct binary segmentation fault (exit code 139)."
            exit 1
          fi

          echo "No segmentation fault detected in AppRun or direct binary path."

  # Reproduces: https://github.com/huxingyi/dust3d/issues/184
  # Qt 5.15 RHI + X11 + Intel Haswell (HD 4400) causes massive VM allocation and OOM.
  # Delegates entirely to ci/collect_oom_report.sh which downloads the official
  # 1.1.3 AppImage, runs 5 RHI backend variants, monitors memory, and writes a report.
  qt515-oom-haswell-reproduction:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    needs: build-appimage-ubuntu-22-04
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Download newly built AppImage
        uses: actions/download-artifact@v4
        with:
          name: dust3d-debug-built-appimage
          path: .

      - name: Make AppImage available as the expected filename
        run: mv dust3d-debug-built.AppImage dust3d-1.1.3.AppImage

      - name: Install runtime dependencies
        run: |
          apt-get update
          apt-get install -y \
            file \
            fontconfig \
            libgpg-error0 \
            libegl1 \
            libgl1-mesa-dri \
            libgles2 \
            libglx-mesa0 \
            libxcb1 \
            libxcb-glx0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            mesa-utils \
            mesa-vulkan-drivers \
            procps \
            wget \
            xvfb

      - name: Run diagnostic script
        run: |
          chmod +x ci/collect_oom_report.sh
          bash ci/collect_oom_report.sh
          # Surface the report filename for the next step
          echo "REPORT_FILE=$(ls dust3d_oom_report_*.txt 2>/dev/null | head -1)" >> "$GITHUB_ENV"

      - name: Upload report and per-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qt515-oom-haswell-reproduction
          path: |
            dust3d_oom_report_*.txt

      - name: Evaluate OOM reproduction
        run: |
          REPORT=$(ls dust3d_oom_report_*.txt 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No report file found — script may have failed early."
            exit 1
          fi

          echo "=== Summary table ==="
          grep -A20 "SUMMARY TABLE" "$REPORT" | head -25 || true

          echo ""
          echo "=== OOM pattern flags ==="
          grep -E "FLAG_HIGH|OOM_PATTERN|REPRODUCED|UNEXPECTED" "$REPORT" || echo "(none)"

          # Check Test 1 exit code from the report
          T1_EXIT=$(grep -A3 "Exit code:" "$REPORT" | grep -m1 "t1-opengl" -A1 | tail -1 || true)
          T2_EXIT=$(grep "CHILD_EXIT" "$REPORT" | sed -n '2p' | cut -d= -f2 || true)

          # Flag if software backend also OOMs (unexpected regression)
          if grep -q "FLAG_HIGH.*t2-software\|OOM_PATTERN.*t2-software" "$REPORT" 2>/dev/null; then
            echo "UNEXPECTED: QSG_RHI_BACKEND=software also triggers OOM — regression beyond #184"
            exit 1
          fi

          echo "Done. Full report: $REPORT"

  # Attempts to reproduce issue #184 using only the official 1.1.3 AppImage
  # under a strict 4 GB per-process virtual memory cap.
  oom-memory-limit-regression:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install runtime dependencies
        run: |
          apt-get update
          apt-get install -y \
            file \
            fontconfig \
            libcom-err2 \
            libgpg-error0 \
            libegl1 \
            libgl1-mesa-dri \
            libgles2 \
            libglx-mesa0 \
            libxcb1 \
            libxcb-glx0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            mesa-vulkan-drivers \
            procps \
            util-linux \
            wget \
            xvfb

      - name: Download official 1.1.3 AppImage
        run: |
          wget -q -O dust3d-official-1.1.3.AppImage \
            https://github.com/huxingyi/dust3d/releases/download/1.1.3/dust3d-1.1.3.AppImage
          chmod +x dust3d-official-1.1.3.AppImage

      - name: Extract official AppImage
        run: |
          ./dust3d-official-1.1.3.AppImage --appimage-extract
          mv squashfs-root official-squashfs
          chmod +x official-squashfs/AppRun

      - name: Verify extracted AppImage and prlimit
        run: |
          echo "=== official-squashfs/AppRun ==="
          ls -la official-squashfs/AppRun
          file official-squashfs/AppRun
          head -3 official-squashfs/AppRun
          echo ""
          echo "=== prlimit smoke test ==="
          which prlimit || echo "WARNING: prlimit not in PATH"
          prlimit --as=12884901888:12884901888 echo "prlimit+echo OK"
          echo "smoke-test exit: $?"

      - name: Run official app under 4 GB memory limit
        shell: bash
        run: |
          set +e

          # 4 GB = 4 * 1024^3 = 4294967296 bytes
          # prlimit sets RLIMIT_AS on the exec'd process at launch time, so
          # the limit applies to the AppImage's fresh address space, not the
          # already-large address space of the runner shell.
          LIMIT_BYTES=4294967296

          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"

          pkill Xvfb 2>/dev/null || true
          sleep 0.3
          Xvfb :99 -screen 0 1280x800x24 > /dev/null 2>&1 &
          sleep 0.8

          echo "--- official-1.1.3 ---"
          echo "  AppRun: $(ls -la official-squashfs/AppRun 2>&1)"

          prlimit "--as=${LIMIT_BYTES}:${LIMIT_BYTES}" \
            timeout 30s env QSG_RHI_BACKEND=opengl QT_QPA_PLATFORM=xcb official-squashfs/AppRun \
            > official-1.1.3.log 2>&1
          OFFICIAL_EC=$?
          echo "$OFFICIAL_EC" > official-1.1.3.exitcode

          echo "  Exit: $OFFICIAL_EC"
          echo "  Log tail:"
          tail -5 official-1.1.3.log | sed 's/^/    /'

          pkill Xvfb 2>/dev/null || true

          echo ""
          echo "=== Results ==="
          echo "Official 1.1.3 exit: $OFFICIAL_EC"

          # Reproduction expectation: official should fail under a 4 GB cap.
          if [ "$OFFICIAL_EC" = "0" ] || [ "$OFFICIAL_EC" = "124" ]; then
            echo "FAIL: Official 1.1.3 still passed under the 4 GB limit; reproduction did not trigger."
            exit 1
          else
            echo "CONFIRMED: Official 1.1.3 fails under the 4 GB memory limit."
          fi

      - name: Upload memory-limit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oom-memory-limit-regression
          path: |
            official-1.1.3.log
            official-1.1.3.exitcode
