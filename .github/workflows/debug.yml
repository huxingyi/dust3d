name: debug

on:
  push:
    branches:
      - debug
  pull_request:
    branches:
      - debug
  workflow_dispatch:

jobs:
  build-appimage-ubuntu-22-04:
    if: false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.3.*'
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          archives: 'qttools qtsvg qtimageformats qtbase qtmultimedia icu'

      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake
          make -j"$(nproc)"

      - name: Build AppImage with ci/appimage/bundle.sh
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          cd ${GITHUB_WORKSPACE}
          sh ./ci/appimage/bundle.sh
          chmod +x Dust3D-x86_64.AppImage
          mv Dust3D-x86_64.AppImage dust3d-debug-built.AppImage

      - name: Upload built AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-debug-built-appimage
          path: dust3d-debug-built.AppImage

  fedora-appimage-crash-debug:
    if: false
    needs: build-appimage-ubuntu-22-04
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install debug dependencies
        run: |
          dnf -y update
          dnf -y install \
            file \
            fontconfig \
            gdb \
            glibc-langpack-en \
            libX11 \
            libXcursor \
            libXext \
            libxcb \
            mesa-dri-drivers \
            mesa-libGL \
            mesa-vulkan-drivers \
            procps-ng \
            which \
            xorg-x11-server-Xvfb

      - name: Download built AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dust3d-debug-built-appimage
          path: .

      - name: Prepare AppImage
        run: |
          mv dust3d-debug-built.AppImage dust3d.AppImage
          chmod +x dust3d.AppImage
          sha256sum dust3d.AppImage | tee sha256sum.txt
          file dust3d.AppImage | tee file.txt

      - name: Extract AppImage
        run: |
          ./dust3d.AppImage --appimage-extract
          
      - name: Verify extracted structure
        run: |
          echo "=== Verifying AppImage structure ==="
          if [ ! -d squashfs-root ]; then
            echo "ERROR: squashfs-root directory not created"
            exit 1
          fi
          
          echo "Checking critical files:"
          ls -lh squashfs-root/AppRun || echo "ERROR: AppRun not found"
          ls -lh squashfs-root/usr/bin/dust3d || echo "ERROR: Binary not found"
          ls -lh squashfs-root/usr/lib/libfontconfig.so.1 2>/dev/null || echo "WARNING: libfontconfig.so.1 not found"
          
          echo ""
          echo "Full directory structure:"
          find squashfs-root -type f -executable | sort

      - name: Run debug probes
        run: |
          set +e
          cd squashfs-root
          
          # Verify we're in the right place
          echo "=== Current directory ==="
          pwd
          echo "AppRun details:"
          file ./AppRun
          ./AppRun --version 2>&1 || echo "AppRun execution attempted"
          
          echo ""
          echo "Binary details:"
          file ./usr/bin/dust3d
          ./usr/bin/dust3d --version 2>&1 || echo "Binary execution attempted"
          
          ulimit -c 0
          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 2

          echo ""
          echo "=== Test 1: Running AppRun with debug logging ==="
          timeout 10s env APPIMAGE_DEBUG=1 QT_DEBUG_PLUGINS=1 LIBGL_DEBUG=verbose MESA_DEBUG=1 ./AppRun \
            > ../run-apprun-debug.log 2>&1
          echo $? > ../run-apprun-debug.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 2: Running AppRun with software OpenGL ==="
          timeout 10s env QT_OPENGL=software ./AppRun > ../run-apprun-software-gl.log 2>&1
          echo $? > ../run-apprun-software-gl.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 3: Running usr/bin/dust3d directly ==="
          timeout 10s ./usr/bin/dust3d > ../run-binary.log 2>&1
          echo $? > ../run-binary.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 4: Running usr/bin/dust3d with software OpenGL ==="
          timeout 10s env QT_OPENGL=software ./usr/bin/dust3d > ../run-binary-software-gl.log 2>&1
          echo $? > ../run-binary-software-gl.exitcode
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 5: Running gdb for AppRun ==="
          timeout 10s gdb -q -batch \
            -ex "set pagination off" \
            -ex "run" \
            -ex "bt full" \
            -ex "thread apply all bt full" \
            -ex "info sharedlibrary" \
            --args ./AppRun > ../gdb-apprun.txt 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true
          sleep 1
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 1

          echo "=== Test 6: Running gdb for usr/bin/dust3d ==="
          timeout 10s gdb -q -batch \
            -ex "set pagination off" \
            -ex "run" \
            -ex "bt full" \
            -ex "thread apply all bt full" \
            -ex "info sharedlibrary" \
            --args ./usr/bin/dust3d > ../gdb-binary.txt 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true
          
          echo ""
          echo "=== Exit codes summary ==="
          echo "AppRun debug: $(cat ../run-apprun-debug.exitcode)"
          echo "AppRun software GL: $(cat ../run-apprun-software-gl.exitcode)"
          echo "Binary: $(cat ../run-binary.exitcode)"
          echo "Binary software GL: $(cat ../run-binary-software-gl.exitcode)"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-appimage-crash-debug
          path: |
            sha256sum.txt
            file.txt
            run-apprun-debug.log
            run-apprun-debug.exitcode
            run-apprun-software-gl.log
            run-apprun-software-gl.exitcode
            run-binary.log
            run-binary.exitcode
            run-binary-software-gl.log
            run-binary-software-gl.exitcode
            gdb-apprun.txt
            gdb-binary.txt

      - name: Evaluate crash results
        run: |
          apprun_code=$(cat run-apprun-debug.exitcode)
          apprun_sw_code=$(cat run-apprun-software-gl.exitcode)
          binary_code=$(cat run-binary.exitcode)
          binary_sw_code=$(cat run-binary-software-gl.exitcode)

          echo "AppRun debug exit code: $apprun_code"
          echo "AppRun software GL exit code: $apprun_sw_code"
          echo "Binary exit code: $binary_code"
          echo "Binary software GL exit code: $binary_sw_code"

          if [ "$apprun_code" = "139" ] || [ "$apprun_sw_code" = "139" ]; then
            echo "Detected AppRun segmentation fault (exit code 139)."
            exit 1
          fi

          if [ "$binary_code" = "139" ] || [ "$binary_sw_code" = "139" ]; then
            echo "Detected direct binary segmentation fault (exit code 139)."
            exit 1
          fi

          echo "No segmentation fault detected in AppRun or direct binary path."

  # Reproduces: https://github.com/huxingyi/dust3d/issues/184
  # Qt6 + X11 + older Intel (Haswell) GPU causes massive VM allocation (~25-33 GB)
  # and OOM kill during startup. Tests RHI backend variants and monitors RSS/VM.
  # Runs inside debian:trixie to match the reporter's antiX / Debian Trixie system.
  # Uses the official 1.1.3 release AppImage — the exact binary reported as broken.
  qt6-oom-haswell-reproduction:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install runtime dependencies
        run: |
          apt-get update
          apt-get install -y \
            file \
            fontconfig \
            gdb \
            libgpg-error0 \
            libegl1 \
            libgl1-mesa-dri \
            libgles2 \
            libglx-mesa0 \
            libxcb1 \
            libxcb-glx0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            mesa-utils \
            mesa-vulkan-drivers \
            procps \
            wget \
            xvfb

      - name: Download official 1.1.3 AppImage
        run: |
          wget -q -O dust3d.AppImage \
            https://github.com/huxingyi/dust3d/releases/download/1.1.3/dust3d-1.1.3.AppImage
          chmod +x dust3d.AppImage

      - name: Prepare AppImage
        run: |
          # AppImage FUSE mount is unavailable in containers; extract instead.
          ./dust3d.AppImage --appimage-extract

      - name: Install memory monitoring helper
        run: |
          # Wraps a command, samples /proc/<pid>/status every 0.2s, writes peak
          # VmPeak/VmRSS to a stats file, and exits 42 if thresholds are exceeded.
          # Stats are written to a separate file (first arg) so they survive even
          # if the process is killed by timeout before it can flush stdout.
          cat > monitor_mem.sh << 'EOF'
          #!/usr/bin/env bash
          STATS_FILE="$1"; shift
          THRESHOLD_RSS_KB=$((1024 * 1024))  # 1 GB — well below the 5 GB reported
          THRESHOLD_VM_KB=$((4 * 1024 * 1024))  # 4 GB VM — well below the 25 GB reported
          PEAK_RSS=0
          PEAK_VM=0

          "$@" &
          TARGET_PID=$!

          while kill -0 "$TARGET_PID" 2>/dev/null; do
            STATUS_FILE="/proc/$TARGET_PID/status"
            if [ -r "$STATUS_FILE" ]; then
              RSS=$(awk '/^VmRSS:/{print $2}' "$STATUS_FILE" 2>/dev/null || echo 0)
              VM=$(awk '/^VmPeak:/{print $2}' "$STATUS_FILE" 2>/dev/null || echo 0)
              [ "${RSS:-0}" -gt "$PEAK_RSS" ] && PEAK_RSS=${RSS:-0}
              [ "${VM:-0}" -gt "$PEAK_VM" ] && PEAK_VM=${VM:-0}
            fi
            sleep 0.2
          done

          wait "$TARGET_PID" || true
          EXIT_CODE=$?

          {
            echo "PEAK_RSS_KB=$PEAK_RSS"
            echo "PEAK_VM_KB=$PEAK_VM"
            echo "CHILD_EXIT=$EXIT_CODE"
            if [ "$PEAK_RSS" -gt "$THRESHOLD_RSS_KB" ]; then
              echo "OOM_PATTERN_DETECTED: RSS ${PEAK_RSS} KB exceeded threshold ${THRESHOLD_RSS_KB} KB"
            fi
            if [ "$PEAK_VM" -gt "$THRESHOLD_VM_KB" ]; then
              echo "OOM_PATTERN_DETECTED: VM ${PEAK_VM} KB exceeded threshold ${THRESHOLD_VM_KB} KB"
            fi
          } > "$STATS_FILE"

          if [ "$PEAK_RSS" -gt "$THRESHOLD_RSS_KB" ] || [ "$PEAK_VM" -gt "$THRESHOLD_VM_KB" ]; then
            exit 42
          fi
          exit "$EXIT_CODE"
          EOF
          chmod +x monitor_mem.sh

      - name: Run OOM reproduction tests
        run: |
          set +e
          cd squashfs-root

          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          start_xvfb() {
            pkill Xvfb 2>/dev/null || true
            sleep 0.3
            # Use 24-bit depth; some Qt6 RHI paths allocate framebuffers proportional
            # to bit depth / MSAA — keep fixed so allocations are comparable.
            Xvfb :99 -screen 0 1280x800x24 > /dev/null 2>&1 &
            sleep 1
          }

          MONITOR="${GITHUB_WORKSPACE}/monitor_mem.sh"

          # ── Test 1: Default RHI (opengl) ─────────────────────────────────────
          # This is the primary failure path on Haswell: Qt6 SceneGraph initialises
          # an OpenGL framebuffer that explodes in size on the crocus/i965 driver.
          start_xvfb
          echo "=== Test 1: QSG_RHI_BACKEND=opengl (default, expected OOM path) ==="
          timeout 30s bash "$MONITOR" ../test1-opengl.stats \
            env QSG_RHI_BACKEND=opengl \
                QT_DEBUG_PLUGINS=1 \
                LIBGL_DEBUG=verbose \
                MESA_DEBUG=1 \
                ./AppRun \
            > ../test1-opengl.log 2>&1
          echo $? > ../test1-opengl.exitcode

          # ── Test 2: RHI software backend ─────────────────────────────────────
          # Reporter's only partial workaround; expect no OOM but possibly a
          # blank/transparent window (exit 0 or timeout 124).
          start_xvfb
          echo "=== Test 2: QSG_RHI_BACKEND=software ==="
          timeout 30s bash "$MONITOR" ../test2-software.stats \
            env QSG_RHI_BACKEND=software \
                QT_DEBUG_PLUGINS=1 \
                ./AppRun \
            > ../test2-software.log 2>&1
          echo $? > ../test2-software.exitcode

          # ── Test 3: Qt software OpenGL (ANGLE / llvmpipe path) ────────────────
          start_xvfb
          echo "=== Test 3: QT_OPENGL=software ==="
          timeout 30s bash "$MONITOR" ../test3-qt-software-gl.stats \
            env QT_OPENGL=software \
                QSG_RHI_BACKEND=opengl \
                QT_DEBUG_PLUGINS=1 \
                ./AppRun \
            > ../test3-qt-software-gl.log 2>&1
          echo $? > ../test3-qt-software-gl.exitcode

          # ── Test 4: Force Mesa software renderer (no hardware GPU path) ───────
          # Isolates whether the issue is GPU-driver-specific or Qt/RHI-generic.
          start_xvfb
          echo "=== Test 4: LIBGL_ALWAYS_SOFTWARE=1 (Mesa llvmpipe) ==="
          timeout 30s bash "$MONITOR" ../test4-llvmpipe.stats \
            env LIBGL_ALWAYS_SOFTWARE=1 \
                QSG_RHI_BACKEND=opengl \
                QT_DEBUG_PLUGINS=1 \
                MESA_DEBUG=1 \
                ./AppRun \
            > ../test4-llvmpipe.log 2>&1
          echo $? > ../test4-llvmpipe.exitcode

          # ── Test 5: Vulkan RHI ────────────────────────────────────────────────
          # Haswell has no Vulkan support; this should fall back or fail cleanly,
          # not cause OOM.
          start_xvfb
          echo "=== Test 5: QSG_RHI_BACKEND=vulkan ==="
          timeout 30s bash "$MONITOR" ../test5-vulkan.stats \
            env QSG_RHI_BACKEND=vulkan \
                QT_DEBUG_PLUGINS=1 \
                ./AppRun \
            > ../test5-vulkan.log 2>&1
          echo $? > ../test5-vulkan.exitcode

          pkill Xvfb 2>/dev/null || true

          echo ""
          echo "=== Exit codes ==="
          for f in ../test*.exitcode; do echo "$f: $(cat $f)"; done

          echo ""
          echo "=== Peak memory from each test ==="
          for stats in ../test*.stats; do
            echo "--- $stats ---"
            cat "$stats" 2>/dev/null || echo "(no stats file)"
          done

      - name: Upload OOM reproduction artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qt6-oom-haswell-reproduction
          path: |
            test1-opengl.log
            test1-opengl.exitcode
            test1-opengl.stats
            test2-software.log
            test2-software.exitcode
            test2-software.stats
            test3-qt-software-gl.log
            test3-qt-software-gl.exitcode
            test3-qt-software-gl.stats
            test4-llvmpipe.log
            test4-llvmpipe.exitcode
            test4-llvmpipe.stats
            test5-vulkan.log
            test5-vulkan.exitcode
            test5-vulkan.stats

      - name: Evaluate OOM reproduction
        run: |
          opengl_code=$(cat test1-opengl.exitcode)
          software_code=$(cat test2-software.exitcode)
          llvmpipe_code=$(cat test4-llvmpipe.exitcode)

          echo "--- Memory stats ---"
          for f in test*.stats; do echo "$f:"; cat "$f" 2>/dev/null || echo "(missing)"; done

          echo "opengl exit:    $opengl_code"
          echo "software exit:  $software_code"
          echo "llvmpipe exit:  $llvmpipe_code"

          # Exit 42 = OOM pattern (RSS or VM threshold exceeded by monitor_mem.sh)
          # Exit 9  = SIGKILL (OOM killer)
          # Exit 137 = SIGKILL via shell (128+9)
          if [ "$opengl_code" = "42" ] || [ "$opengl_code" = "9" ] || [ "$opengl_code" = "137" ]; then
            echo "REPRODUCED: Qt6 OpenGL RHI path triggers OOM-like memory explosion (issue #184)"
            # Do not fail the job — the goal is to confirm reproduction, not block CI.
          else
            echo "Not reproduced on this runner hardware/driver combination (exit $opengl_code)."
            echo "The issue is specific to Intel Haswell + crocus/i965 Mesa driver."
          fi

          # The software backend must NOT trigger OOM — flag if it does.
          if [ "$software_code" = "42" ] || [ "$software_code" = "9" ] || [ "$software_code" = "137" ]; then
            echo "UNEXPECTED: QSG_RHI_BACKEND=software also causes OOM — regression beyond #184"
            exit 1
          fi

          echo "Done."
