name: debug

on:
  push:
    branches:
      - debug
  pull_request:
    branches:
      - debug
  workflow_dispatch:

jobs:
  test-latest-preview-ubuntu:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    runs-on: ubuntu-latest
    steps:
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            libfuse2 \
            xvfb

      - name: Download latest preview AppImage
        run: |
          wget --no-verbose -O dust3d-latest-preview.AppImage http://dust3d.org/download/dust3d-latest-preview.AppImage
          chmod +x dust3d-latest-preview.AppImage
          sha256sum dust3d-latest-preview.AppImage | tee sha256sum-ubuntu.txt

      - name: Run AppImage and capture screenshot
        run: |
          set +e
          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          Xvfb :99 -screen 0 1280x720x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 2

          timeout 10s ./dust3d-latest-preview.AppImage > app-run-ubuntu.log 2>&1 &
          APP_PID=$!
          sleep 8

          import -display :99 -window root screenshot-ubuntu.png || true

          wait $APP_PID
          echo $? > app-run-ubuntu.exitcode

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-latest-preview-ubuntu-artifacts
          path: |
            screenshot-ubuntu.png
            app-run-ubuntu.log
            app-run-ubuntu.exitcode
            sha256sum-ubuntu.txt

  test-latest-preview-fedora-43:
    if: github.ref == 'refs/heads/debug' || github.base_ref == 'debug'
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install runtime dependencies
        run: |
          dnf -y update
          dnf -y install \
            fuse-libs \
            ImageMagick \
            wget \
            xorg-x11-server-Xvfb

      - name: Download latest preview AppImage
        run: |
          wget --no-verbose -O dust3d-latest-preview.AppImage http://dust3d.org/download/dust3d-latest-preview.AppImage
          chmod +x dust3d-latest-preview.AppImage
          sha256sum dust3d-latest-preview.AppImage | tee sha256sum-fedora.txt

      - name: Run AppImage and capture screenshot
        run: |
          set +e
          export DISPLAY=:99
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          Xvfb :99 -screen 0 1280x720x24 > /dev/null 2>&1 &
          XVFB_PID=$!
          sleep 2

          timeout 10s ./dust3d-latest-preview.AppImage > app-run-fedora.log 2>&1 &
          APP_PID=$!
          sleep 8

          import -display :99 -window root screenshot-fedora.png || true

          wait $APP_PID
          echo $? > app-run-fedora.exitcode

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

      - name: Upload Fedora artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-latest-preview-fedora43-artifacts
          path: |
            screenshot-fedora.png
            app-run-fedora.log
            app-run-fedora.exitcode
            sha256sum-fedora.txt
