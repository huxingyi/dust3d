name: release

on:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage-upload:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.3.*'
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          archives: 'qttools qtsvg qtimageformats qtbase qtmultimedia icu'
      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake
          make -j`nproc`
      - name: Generate AppImage
        run: |
          sudo apt-get install -y libfuse2
          cd ${GITHUB_WORKSPACE} && sh ./ci/appimage/bundle.sh
          mv Dust3D-x86_64.AppImage dust3d-${{ github.ref_name }}.AppImage
      - name: Checkout test models
        uses: actions/checkout@v4
        with:
          repository: huxingyi/dust3d-test-models
          ref: main
          path: dust3d-test-models
      - name: Install screenshot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick
      - name: Run AppImage and capture screenshot
        run: |
          chmod +x dust3d-${{ github.ref_name }}.AppImage
          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          ./dust3d-${{ github.ref_name }}.AppImage dust3d-test-models/fish/salmon.ds3 &
          APP_PID=$!
          sleep 12
          import -silent -window root dust3d-${{ github.ref_name }}-ubuntu-22.04.png || true
          kill $APP_PID || true
          kill $XVFB_PID || true
      - name: Upload AppImage screenshot
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}-ubuntu-22.04.png
          path: dust3d-${{ github.ref_name }}-ubuntu-22.04.png
      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.AppImage
          path: dust3d-${{ github.ref_name }}.AppImage
  win32-msvc-upload:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Install Qt
        # Generated by https://ddalcino.github.io/aqt-list-server/
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==2.1.*'
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          archives: 'qttools qtsvg qtimageformats qtbase qtmultimedia opengl32sw'
      - name: Build application
        run: |
          cd $env:GITHUB_WORKSPACE/application
          qmake -spec win32-msvc
          nmake -f Makefile.Release
      - name: Set environment variable
        run: |
          set PATH="%PATH%;C:\Program Files\7-Zip"
      - name: Zip executable
        run: |
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/application/release/dust3d.exe
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Svg.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Widgets.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Gui.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Core.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/opengl32sw.dll
          ls "${VCToolsRedistDir}x64"
          CRT_DIR=$(ls -d "${VCToolsRedistDir}x64"/Microsoft.VC*.CRT | head -1)
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/msvcp140.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/msvcp140_1.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/vcruntime140.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/vcruntime140_1.dll"
          mkdir ${GITHUB_WORKSPACE}/platforms
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/platforms/qwindows.dll ${GITHUB_WORKSPACE}/platforms/qwindows.dll
          7z a Dust3D-win32-x86_64.zip -r ${GITHUB_WORKSPACE}/platforms/
          mkdir ${GITHUB_WORKSPACE}/imageformats
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/imageformats/qjpeg.dll ${GITHUB_WORKSPACE}/imageformats/qjpeg.dll
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/imageformats/qsvg.dll ${GITHUB_WORKSPACE}/imageformats/qsvg.dll
          7z a Dust3D-win32-x86_64.zip -r ${GITHUB_WORKSPACE}/imageformats/
          7z x Dust3D-win32-x86_64.zip -odust3d-${{ github.ref_name }}
        shell: bash
      - name: Checkout test models
        uses: actions/checkout@v4
        with:
          repository: huxingyi/dust3d-test-models
          ref: main
          path: dust3d-test-models
      - name: Run application and capture screenshot
        run: |
          cd dust3d-${{ github.ref_name }}
          $env:QT_OPENGL = 'software'
          Start-Process -FilePath .\dust3d.exe -ArgumentList "..\dust3d-test-models\fish\salmon.ds3"
          Start-Sleep -Seconds 12
          Add-Type -AssemblyName System.Windows.Forms
          $bitmap = [System.Drawing.Bitmap]::new([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen(0, 0, 0, 0, $bitmap.Size)
          $bitmap.Save("$env:GITHUB_WORKSPACE\dust3d-${{ github.ref_name }}-windows-2022.png")
          Stop-Process -Name dust3d -Force -ErrorAction SilentlyContinue
        shell: powershell
      - name: Upload Windows screenshot
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}-windows-2022.png
          path: dust3d-${{ github.ref_name }}-windows-2022.png
      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}
          path: Dust3D-win32-x86_64.zip
  macos-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: |
          HOMEBREW_VERBOSE_USING_DOTS=1 brew reinstall --verbose qt@5
          HOMEBREW_VERBOSE_USING_DOTS=1 brew link qt@5 --force
          export PATH="/usr/local/opt/qt@5/bin:$PATH"
      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake CONFIG+=sdk_no_version_check
          CPU_COUNT=$(sysctl -n hw.logicalcpu)
          make -j${CPU_COUNT}
      - name: Checkout test models
        uses: actions/checkout@v4
        with:
          repository: huxingyi/dust3d-test-models
          ref: main
          path: dust3d-test-models
      - name: Install create-dmg
        run: |
          brew install create-dmg
      - name: Generate DMG
        run: |
          # deploy Qt frameworks into the app bundle
          macdeployqt ${GITHUB_WORKSPACE}/application/dust3d.app
          # ad-hoc sign so Gatekeeper doesn't report the app as damaged
          codesign --force --deep --sign - ${GITHUB_WORKSPACE}/application/dust3d.app
          # prepare a staging folder containing the app bundle
          STAGING_DIR=$(mktemp -d)
          cp -R "${GITHUB_WORKSPACE}/application/dust3d.app" "${STAGING_DIR}/"
          # package into drag-to-Applications DMG
          create-dmg \
            --volname "Dust3D" \
            --format UDZO \
            --app-drop-link 520 145 \
            --window-size 660 300 \
            --icon "dust3d.app" 140 145 \
            --icon "Applications" 520 145 \
            "${GITHUB_WORKSPACE}/application/dust3d-${{ github.ref_name }}.dmg" \
            "${STAGING_DIR}"
          rm -rf "${STAGING_DIR}"
      - name: Run application and capture screenshot
        run: |
          open ${GITHUB_WORKSPACE}/application/dust3d.app --args ${GITHUB_WORKSPACE}/dust3d-test-models/fish/salmon.ds3
          sleep 12
          screencapture dust3d-${{ github.ref_name }}-macos-latest.png || true
          killall dust3d || true
      - name: Upload macOS screenshot
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}-macos-latest.png
          path: dust3d-${{ github.ref_name }}-macos-latest.png
      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.dmg
          path: application/dust3d-${{ github.ref_name }}.dmg

  publish-gh-pages:
    runs-on: ubuntu-22.04
    needs:
      - appimage-upload
      - win32-msvc-upload
      - macos-upload
    steps:
      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.AppImage
          path: artifacts
      - name: Download Windows zip artifact
        uses: actions/download-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}
          path: artifacts
      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.dmg
          path: artifacts
      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: huxingyi/huxingyi.github.io
          token: ${{ secrets.UPDATE_REPO_TOKEN }}
          path: gh-pages
      - name: Publish latest builds
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: |
          cd gh-pages
          git config user.email "${{ env.MY_EMAIL }}"
          git config user.name "huxingyi"
          for i in 1 2 3 4 5; do
            git fetch origin master
            git reset --hard origin/master
            cp ../artifacts/dust3d-${{ github.ref_name }}.AppImage download/dust3d-latest-preview.AppImage
            cp ../artifacts/Dust3D-win32-x86_64.zip download/dust3d-latest-preview.zip
            cp ../artifacts/dust3d-${{ github.ref_name }}.dmg download/dust3d-latest-preview.dmg
            git add download/dust3d-latest-preview.AppImage download/dust3d-latest-preview.zip download/dust3d-latest-preview.dmg
            git commit -m "Update latest builds for linux/windows/macos" || true
            git push origin HEAD:master && break
            echo "Push failed due to concurrent update, retrying... ($i)"
            sleep 5
          done
