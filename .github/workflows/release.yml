name: release

on:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage-upload:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.3.*'
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          archives: 'qttools qtsvg qtimageformats qtbase icu'
      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake
          make -j`nproc`
      - name: Generate AppImage
        run: |
          sudo apt-get install -y libfuse2
          cd ${GITHUB_WORKSPACE} && sh ./ci/appimage/bundle.sh
          mv Dust3D-x86_64.AppImage dust3d-${{ github.ref_name }}.AppImage
      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: huxingyi/huxingyi.github.io
          token: ${{ secrets.UPDATE_REPO_TOKEN }}
          path: gh-pages

      - name: Publish latest build
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: |
          cd gh-pages
          git config user.email "${{ env.MY_EMAIL }}"
          git config user.name "huxingyi"
          cp ../dust3d-${{ github.ref_name }}.AppImage download/dust3d-latest-preview.AppImage
          git add download/dust3d-latest-preview.AppImage
          git commit -m "Update latest build for linux" || true
          git push origin HEAD:master
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.AppImage
          path: dust3d-${{ github.ref_name }}.AppImage
  win32-msvc-upload:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Install Qt
        # Generated by https://ddalcino.github.io/aqt-list-server/
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==2.1.*'
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          archives: 'qttools qtsvg qtimageformats qtbase opengl32sw'
      - name: Build application
        run: |
          cd $env:GITHUB_WORKSPACE/application
          qmake -spec win32-msvc
          nmake -f Makefile.Release
      - name: Set environment variable
        run: |
          set PATH="%PATH%;C:\Program Files\7-Zip"
      - name: Zip executable
        run: |
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/application/release/dust3d.exe
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Svg.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Widgets.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Gui.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/Qt5Core.dll
          7z a Dust3D-win32-x86_64.zip ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/bin/opengl32sw.dll
          ls "${VCToolsRedistDir}x64"
          CRT_DIR=$(ls -d "${VCToolsRedistDir}x64"/Microsoft.VC*.CRT | head -1)
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/msvcp140.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/msvcp140_1.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/vcruntime140.dll"
          7z a Dust3D-win32-x86_64.zip "${CRT_DIR}/vcruntime140_1.dll"
          mkdir ${GITHUB_WORKSPACE}/platforms
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/platforms/qwindows.dll ${GITHUB_WORKSPACE}/platforms/qwindows.dll
          7z a Dust3D-win32-x86_64.zip -r ${GITHUB_WORKSPACE}/platforms/
          mkdir ${GITHUB_WORKSPACE}/imageformats
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/imageformats/qjpeg.dll ${GITHUB_WORKSPACE}/imageformats/qjpeg.dll
          cp ${GITHUB_WORKSPACE}/../Qt/5.15.2/msvc2019_64/plugins/imageformats/qsvg.dll ${GITHUB_WORKSPACE}/imageformats/qsvg.dll
          7z a Dust3D-win32-x86_64.zip -r ${GITHUB_WORKSPACE}/imageformats/
          7z x Dust3D-win32-x86_64.zip -odust3d-${{ github.ref_name }}
        shell: bash
      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: huxingyi/huxingyi.github.io
          token: ${{ secrets.UPDATE_REPO_TOKEN }}
          path: gh-pages

      - name: Publish latest build
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: |
          cd gh-pages
          git config user.email "${{ env.MY_EMAIL }}"
          git config user.name "huxingyi"
          cp ../Dust3D-win32-x86_64.zip download/dust3d-latest-preview.zip
          git add download/dust3d-latest-preview.zip
          git commit -m "Update latest build for windows" || true
          git push origin HEAD:master
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}
          path: dust3d-${{ github.ref_name }}/
  macos-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: |
          HOMEBREW_VERBOSE_USING_DOTS=1 brew reinstall --verbose qt@5
          HOMEBREW_VERBOSE_USING_DOTS=1 brew link qt@5 --force
          export PATH="/usr/local/opt/qt@5/bin:$PATH"
      - name: Build application
        run: |
          cd ${GITHUB_WORKSPACE}/application
          qmake CONFIG+=sdk_no_version_check
          CPU_COUNT=$(sysctl -n hw.logicalcpu)
          make -j${CPU_COUNT}
      - name: Generate DMG
        run: |
          # deploy Qt frameworks into the app bundle
          macdeployqt ${GITHUB_WORKSPACE}/application/dust3d.app
          # ad-hoc sign so Gatekeeper doesn't report the app as damaged
          codesign --force --deep --sign - ${GITHUB_WORKSPACE}/application/dust3d.app
          # package into DMG
          hdiutil create -volname "Dust3D" \
            -srcfolder ${GITHUB_WORKSPACE}/application/dust3d.app \
            -ov -format UDZO \
            -o ${GITHUB_WORKSPACE}/application/dust3d-${{ github.ref_name }}.dmg
      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: huxingyi/huxingyi.github.io
          token: ${{ secrets.UPDATE_REPO_TOKEN }}
          path: gh-pages

      - name: Publish latest build
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: |
          cd gh-pages
          git config user.email "${{ env.MY_EMAIL }}"
          git config user.name "huxingyi"
          cp ${GITHUB_WORKSPACE}/application/dust3d-${{ github.ref_name }}.dmg download/dust3d-latest-preview.dmg
          git add download/dust3d-latest-preview.dmg
          git commit -m "Update latest build for macos" || true
          git push origin HEAD:master
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dust3d-${{ github.ref_name }}.dmg
          path: ${{ github.workspace }}/application/dust3d-${{ github.ref_name }}.dmg
